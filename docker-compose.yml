version: "3.9"

services:
  # ── VPN Proxy (gluetun) ────────────────────────────────────────
  # All trading traffic routes through this SOCKS5 proxy.
  # SSH, dashboard, and other services are NOT affected.
  gluetun:
    image: ghcr.io/qdm12/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "127.0.0.1:1080:1080"   # SOCKS5 proxy (host-only, not exposed externally)
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER:-custom}
      - VPN_TYPE=${VPN_TYPE:-openvpn}
      - OPENVPN_USER=${OPENVPN_USER:-}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:-}
      # For WireGuard:
      # - VPN_TYPE=wireguard
      # - WIREGUARD_PRIVATE_KEY=${WG_PRIVATE_KEY:-}
      # - WIREGUARD_ADDRESSES=${WG_ADDRESSES:-}
      # - SERVER_COUNTRIES=${VPN_COUNTRY:-Netherlands}
      #
      # SOCKS5 proxy built into gluetun:
      - SOCKS5=on
      - SOCKS5_LISTENING_ADDRESS=:1080
    volumes:
      - ./data/gluetun:/gluetun
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "https://ipinfo.io/json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PROXY_URL=socks5://gluetun:1080
    volumes:
      - ./data:/app/data
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (Next.js) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000/ws/live
    depends_on:
      - backend
    restart: unless-stopped
